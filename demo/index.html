<!doctype html>
<html>
  <head>
    <title>Pin Button Test</title>
    
    <script src="../importmap/inject.js"></script>
    <script src="../importmap/importmap.build.js"></script>

    <style>
        /* * BODY STYLING (The Background & Text)
         */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            
            /* Light Theme: Subtle gray/white diagonal lines */
            background-color: #ffffff;
            background-image: repeating-linear-gradient(
                45deg,
                #f0f0f0,
                #f0f0f0 10px,
                #ffffff 10px,
                #ffffff 20px
            );
            color: #222222;
            
            /* Smooth transition when switching themes */
            transition: background-color 0.4s, color 0.4s, background-image 0.4s;
        }

        /* Dark Theme: Dark gray/black diagonal lines */
        body.dark-theme {
            background-color: #121212;
            background-image: repeating-linear-gradient(
                45deg,
                #1a1a1a,
                #1a1a1a 10px,
                #121212 10px,
                #121212 20px
            );
            color: #eeeeee;
        }

        /* * TYPOGRAPHY STYLING (The Words)
         */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        p {
            margin-top: 0;
            margin-bottom: 2rem;
            color: #666666;
            font-size: 1.1rem;
        }

        body.dark-theme p {
            color: #aaaaaa;
        }

        /* * BUTTON STYLING (The Theme Toggle)
         */
        button.theme-toggle {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 30px; /* Makes it a pill shape */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s, background-color 0.3s, box-shadow 0.2s;
            margin-bottom: 3rem;
            
            /* Light theme button colors (Dark button on light background) */
            background-color: #222222;
            color: #ffffff;
        }

        button.theme-toggle:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            background-color: #444444;
        }

        /* Dark theme button colors (Light button on dark background) */
        body.dark-theme button.theme-toggle {
            background-color: #eeeeee;
            color: #121212;
        }

        body.dark-theme button.theme-toggle:hover {
            background-color: #ffffff;
        }
    </style>
  </head>

  <body>
    <div>
        <h1>UI Component Challenge</h1>
        <p>Interactive Pin Button</p>
        <button class="theme-toggle" onclick="document.body.classList.toggle('dark-theme')">
            Toggle Page Theme
        </button>
    </div>

    <script src="index.js" type="module"></script>
    
    <pin-button></pin-button>
  </body>
</html>
